<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Sudoku</title>
<style>
body{
font-family:Arial;
background:#222;
color:#fff;
text-align:center;
}
table{
margin:auto;
border-collapse:collapse;
}
td{
border:1px solid #777;
}
tr:nth-child(3) td,tr:nth-child(6) td{
border-bottom:3px solid #fff;
}
td:nth-child(3),td:nth-child(6){
border-right:3px solid #fff;
}
input{
width:45px;
height:45px;
font-size:24px;
text-align:center;
background:#333;
color:white;
border:none;
outline:none;
}
.fixed{
background:#555;
font-weight:bold;
}
button{
margin:10px;
padding:10px 20px;
font-size:18px;
cursor:pointer;
}
</style>
</head>
<body>

<h1>🧩 Sudoku</h1>

<table id="board"></table>

<button onclick="check()">تحقق</button>

<p id="msg"></p>

<script>
const puzzle=[
[5,3,0,0,7,0,0,0,0],
[6,0,0,1,9,5,0,0,0],
[0,9,8,0,0,0,0,6,0],
[8,0,0,0,6,0,0,0,3],
[4,0,0,8,0,3,0,0,1],
[7,0,0,0,2,0,0,0,6],
[0,6,0,0,0,0,2,8,0],
[0,0,0,4,1,9,0,0,5],
[0,0,0,0,8,0,0,7,9]
];

const solution=[
[5,3,4,6,7,8,9,1,2],
[6,7,2,1,9,5,3,4,8],
[1,9,8,3,4,2,5,6,7],
[8,5,9,7,6,1,4,2,3],
[4,2,6,8,5,3,7,9,1],
[7,1,3,9,2,4,8,5,6],
[9,6,1,5,3,7,2,8,4],
[2,8,7,4,1,9,6,3,5],
[3,4,5,2,8,6,1,7,9]
];

const board=document.getElementById("board");

for(let r=0;r<9;r++){
let tr=document.createElement("tr");
for(let c=0;c<9;c++){
let td=document.createElement("td");
let inp=document.createElement("input");
inp.maxLength=1;

if(puzzle[r][c]){
inp.value=puzzle[r][c];
inp.disabled=true;
inp.className="fixed";
}

inp.id=r+"-"+c;

inp.oninput=function(){
this.value=this.value.replace(/[^1-9]/g,"");
};

td.appendChild(inp);
tr.appendChild(td);
}
board.appendChild(tr);
}

function check(){
let ok=true;

for(let r=0;r<9;r++){
for(let c=0;c<9;c++){
let cell=document.getElementById(r+"-"+c);
cell.style.color="white";

if(Number(cell.value)!==solution[r][c]){
ok=false;
if(!cell.disabled) cell.style.color="red";
}
}
}

document.getElementById("msg").innerHTML=
ok?"🎉 أحسنت! لقد فزت":"❌ توجد أخطاء.";
}
</script>

</body>
</html>
