name: Build Dz Game Release

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyQt6-WebEngine rarfile pyinstaller

      - name: Build Single Executable File
        shell: cmd  
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "Dz_Game" --hidden-import=pkgutil --add-data "src/assets;src/assets" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DzGame-Single-File-Launcher
          path: dist/Dz_Game.exe
